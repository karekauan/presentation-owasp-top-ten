<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OWASP Top 10:2025 — Demonstração prática</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/night.css" id="theme">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <style>
    .reveal pre { width: 100%; font-size: .55em; }
    .reveal table { font-size: .7em; }
    .reveal .tag { font-family: monospace; background:#b91c1c; color:#fff; padding:.1em .4em; border-radius:.3em; }
    .reveal small.src { font-size:.4em; opacity:.6; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <!-- Carrega o roteiro de slides.md. Separadores:
           ---  novo slide (horizontal)
           --   sub-slide (vertical)
           Note: fala do apresentador (tecla S abre o speaker view) -->
      <section data-markdown="slides.md"
               data-separator="^\r?\n---\r?\n$"
               data-separator-vertical="^\r?\n--\r?\n$"
               data-separator-notes="^Note:">
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t',
      plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
    });
  </script>
</body>
</html>
